name: ETF Scanner — Run & Publish
on:
  schedule:
    - cron: '30 18 * * 1-5'   # 20:30 IT — scanner principale
    - cron: '0 22 * * 1-5'    # 00:00 IT — scanner principale
    - cron: '0 1 * * 1-5'     # 03:00 IT — min finder notturno
    - cron: '30 7 * * 1-5'    # 09:30 IT — min finder live
    - cron: '0 14 * * 1-5'    # 16:00 IT — min finder live
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Install dipendenze
        run: |
          pip install -r requirements.txt
          pip install yfinance numpy --break-system-packages -q || true

      - name: Crea cartelle se mancano
        run: |
          mkdir -p data/cache
          mkdir -p logs

      - name: Esegui scanner principale
        run: python fetch_and_compute.py

      - name: Copia universo ETF in data/
        run: cp etf_universe.json data/etf_universe.json || true

      - name: Min Finder — scansione notturna (2.253 ETF)
        if: github.event_name == 'workflow_dispatch' || contains(github.event.schedule, '0 1')
        run: python fetch_min_finder.py
        timeout-minutes: 60

      - name: Min Finder — live update candidati
        if: contains(github.event.schedule, '30 7') || contains(github.event.schedule, '0 14')
        run: python update_min_finder_live.py

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "🤖 Scanner update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
