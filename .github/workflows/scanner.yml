name: ETF Scanner — Run & Publish

on:
  schedule:
    - cron: '30 18 * * 1-5'
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Install dipendenze
        run: pip install -r requirements.txt

      - name: Crea cartelle se mancano
        run: |
          mkdir -p data/cache
          mkdir -p logs

      - name: Esegui scanner
        run: python fetch_and_compute.py

      - name: Commit e push signals.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signals.json
          git diff --staged --quiet || git commit -m "🤖 Scanner update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
