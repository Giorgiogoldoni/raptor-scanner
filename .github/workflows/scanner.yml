name: ETF Scanner — Run & Publish

on:
  schedule:
    # Ogni giorno alle 18:30 UTC (20:30 ora italiana, dopo chiusura mercati EU)
    - cron: '30 18 * * 1-5'
    # Ogni giorno alle 22:00 UTC (dopo chiusura USA)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:   # Permette lancio manuale dal tab Actions

permissions:
  contents: write      # Necessario per fare commit su signals.json

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dipendenze
        run: pip install -r requirements.txt

      - name: Crea cartelle se mancano
        run: |
          mkdir -p data/cache
          mkdir -p logs

      - name: Esegui scanner
        run: python fetch_and_compute.py

      - name: Commit e push signals.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signals.json
          # Commit solo se il file è cambiato
          git diff --staged --quiet || git commit -m "🤖 Scanner update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
